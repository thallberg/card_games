# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - cardgames-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Behövs för att ladda ner actions och artifact mellan jobs (undviker 401).
permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'

      - name: Build with dotnet
        run: dotnet build backend/Backend.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish backend/Backend.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    # Opt-in till Node 24 för actions (avråder från Node 20).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_35143823D2F74BF491B028BC3EE08FF0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_309E6B858C5A483FB7A44B9D3155FB6B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_B0D5782B02604A019EC5D15397D5488C }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cardgames-api'
          slot-name: 'Production'
          package: .
          